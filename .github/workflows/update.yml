name: Check Upstream Updates

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  check-update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22

      - name: Check for new upstream release
        id: check
        run: |
          CURRENT_VERSION="$(cat .upstream-version | tr -d '[:space:]')"
          LATEST_TAG=$(gh api repos/mixxxdj/mixxx/releases/latest --jq '.tag_name')
          echo "current=$CURRENT_VERSION" >> "$GITHUB_OUTPUT"
          echo "latest=$LATEST_TAG" >> "$GITHUB_OUTPUT"
          if [[ "$CURRENT_VERSION" != "$LATEST_TAG" ]]; then
            echo "update_available=true" >> "$GITHUB_OUTPUT"
          else
            echo "update_available=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create update branch and PR
        if: steps.check.outputs.update_available == 'true'
        run: |
          NEW_VERSION="${{ steps.check.outputs.latest }}"
          BRANCH="update/upstream-${NEW_VERSION}"

          if gh pr list --head "$BRANCH" --json number --jq '.[0].number' | grep -q .; then
            echo "PR already exists for $BRANCH"
            exit 0
          fi

          NEW_HASH=$(nix-prefetch-url --unpack --type sha256 \
            "https://github.com/mixxxdj/mixxx/archive/refs/tags/${NEW_VERSION}.tar.gz" 2>/dev/null)
          NEW_HASH_SRI=$(nix hash convert --to sri --hash-algo sha256 "$NEW_HASH")

          sed -i "s|hash = \"sha256-[^\"]*\"|hash = \"${NEW_HASH_SRI}\"|" flake.nix

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          echo "$NEW_VERSION" > .upstream-version
          git add .upstream-version flake.nix
          git commit -m "chore: update upstream to $NEW_VERSION"
          git push origin "$BRANCH"
          gh pr create \
            --title "Update upstream to $NEW_VERSION" \
            --body "New upstream release detected: $NEW_VERSION (was: ${{ steps.check.outputs.current }})" \
            --base main \
            --head "$BRANCH"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
